<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Fashion AI</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='style.css') }}"
    >

</head>

<body>

<div class="container">

    <div class="card-box">

        <h1 class="title">
            👗 Fashion AI
        </h1>

        <p class="subtitle">
            Upload outfit để AI nhận diện
        </p>

        <form method="POST"
              enctype="multipart/form-data">

            <input
                type="file"
                name="file"
                class="form-control"
                required
            >

            <button
                type="submit"
                class="btn btn-custom"
            >
                Predict
            </button>

        </form>

        {% if result %}

        <div class="result-box">

            <h2>
                {{ result }}
            </h2>

            <h4>
                🎯 {{ confidence }}%
            </h4>

            <div class="tip-box">
                {{ tip }}
            </div>

        </div>

        {% endif %}

    </div>

</div>

</body>
</html>
